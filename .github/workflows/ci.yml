name: MILC CI

on:
  push:
    branches:
      - master
    paths:
      - '**.py'
      - ci_tests
      - example
      - hello
      - milc-color
      - passwd_complexity
      - passwd_confirm
      - questions
      - sparkline
      - spinner
      - spinner_qmk
      - pyproject.toml
  pull_request:
    branches:
      - master
    paths:
      - '**.py'
      - ci_tests
      - example
      - hello
      - milc-color
      - passwd_complexity
      - passwd_confirm
      - questions
      - sparkline
      - spinner
      - spinner_qmk
      - pyproject.toml

jobs:
  ci_tests:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }} --group dev
    - name: Run CI tests
      run: uv run python ci_tests --ci
